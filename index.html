<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rutina Bruno 💪</title>
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rutina Bruno" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a;
      --border: #2a2a2a; --accent: #d4ff00; --accent2: #ff6b35;
      --text: #f0f0f0; --muted: #666; --radius: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100dvh; padding-bottom:80px; }
 
    .screen { display:none; }
    .screen.active { display:block; }
 
    /* HOME */
    .home-header { padding:24px 16px 12px; }
    .home-title { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:2px; }
    .home-title span { color:var(--accent); }
    .home-sub { font-size:13px; color:var(--muted); margin-top:4px; }
    .week-pill { display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--muted); margin:0 16px 20px; }
    .week-pill strong { color:var(--text); }
    .day-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 20px; }
    .day-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; cursor:pointer; position:relative; overflow:hidden; transition:border-color 0.15s; }
    .day-card:active { border-color:#444; }
    .day-card .dc-num { font-family:'Bebas Neue',sans-serif; font-size:40px; color:var(--accent); line-height:1; }
    .day-card .dc-label { font-size:11px; color:var(--muted); margin-top:2px; letter-spacing:0.5px; text-transform:uppercase; }
    .day-card .dc-focus { font-size:11px; color:var(--muted); margin-top:8px; line-height:1.4; }
    .day-card .dc-done { position:absolute; top:10px; right:10px; background:#1a2a1a; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:11px; }
    .history-btn { margin:0 16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:10px; font-size:14px; color:var(--text); width:calc(100% - 32px); font-family:'Inter',sans-serif; }
 
    /* DAY SCREEN */
    .day-top { display:flex; align-items:center; gap:10px; padding:16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:10; }
    .back-btn { background:none; border:none; cursor:pointer; color:var(--text); font-size:22px; padding:2px 6px; }
    .day-top-info .dt-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; color:var(--accent); }
    .day-top-info .dt-sub { font-size:11px; color:var(--muted); margin-top:1px; }
 
    .exercises-wrap { padding:12px 16px; }
 
    .superset-tag { font-size:10px; font-weight:600; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin:16px 0 8px; display:flex; align-items:center; gap:8px; }
    .superset-tag:first-child { margin-top:0; }
    .superset-tag .ss-badge { background:var(--accent2); color:#fff; font-size:9px; padding:2px 7px; border-radius:3px; letter-spacing:1px; }
    .superset-tag::after { content:''; flex:1; height:1px; background:var(--border); }
 
    .ex-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; overflow:hidden; }
    .ex-card.open { border-color:#333; }
    .ex-header { display:flex; align-items:center; gap:10px; padding:13px; cursor:pointer; }
    .ex-order { background:var(--surface2); color:var(--accent); font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:1px; padding:3px 8px; border-radius:5px; flex-shrink:0; }
    .ex-info { flex:1; min-width:0; }
    .ex-name { font-size:14px; font-weight:600; line-height:1.3; margin-bottom:5px; }
    .ex-chips { display:flex; gap:6px; flex-wrap:wrap; }
    .chip { font-size:11px; color:var(--muted); background:var(--surface2); padding:2px 7px; border-radius:4px; }
    .chip.series { color:var(--accent); }
    .chip.max { color:#d4ff00; background:#1a2200; }
    .chip.ref { color:#aaa; }
    .ex-arrow { color:var(--muted); font-size:16px; flex-shrink:0; transition:transform 0.2s; }
    .ex-card.open .ex-arrow { transform:rotate(180deg); }
 
    .ex-body { display:none; padding:0 13px 13px; border-top:1px solid var(--border); }
    .ex-card.open .ex-body { display:block; }
    .ex-note { background:var(--surface2); border-left:2px solid var(--accent2); border-radius:0 6px 6px 0; padding:8px 10px; font-size:12px; color:#aaa; line-height:1.5; margin:12px 0 10px; }
    .yt-link { display:inline-flex; align-items:center; gap:6px; color:#fff; background:#1a1a2e; border:1px solid #333; border-radius:7px; padding:7px 12px; font-size:12px; text-decoration:none; font-weight:500; margin-bottom:12px; }
 
    .log-title { font-size:10px; font-weight:600; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
    .series-hdr { display:grid; grid-template-columns:22px 1fr 1fr 1fr; gap:6px; margin-bottom:4px; }
    .series-hdr span { font-size:10px; color:var(--muted); text-align:center; }
    .series-hdr span:first-child { text-align:left; }
    .series-row { display:grid; grid-template-columns:22px 1fr 1fr 1fr; gap:6px; align-items:center; margin-bottom:6px; }
    .series-num { font-size:11px; color:var(--muted); text-align:center; }
    .series-row input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:7px 4px; font-size:13px; text-align:center; color:var(--text); font-family:'Inter',sans-serif; width:100%; outline:none; }
    .series-row input:focus { border-color:#444; }
    .add-serie-btn { background:none; border:1px dashed var(--border); border-radius:7px; width:100%; padding:7px; font-size:12px; color:var(--muted); cursor:pointer; font-family:'Inter',sans-serif; margin-bottom:10px; }
    .save-btn { width:100%; padding:11px; border-radius:7px; border:1px solid var(--border); background:transparent; font-size:13px; font-weight:600; cursor:pointer; color:var(--text); font-family:'Inter',sans-serif; transition:all 0.2s; }
    .save-btn.saved { background:#1a2200; border-color:var(--accent); color:var(--accent); }
 
    /* HISTORY */
    .hist-top { display:flex; align-items:center; gap:10px; padding:16px; border-bottom:1px solid var(--border); }
    .hist-top-title { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:1px; }
    .hist-wrap { padding:12px 16px; }
    .week-block { margin-bottom:20px; }
    .week-block-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .week-block-title { font-size:12px; font-weight:600; color:var(--accent); }
    .del-week-btn { background:none; border:1px solid #333; color:#555; border-radius:5px; padding:3px 9px; font-size:11px; cursor:pointer; font-family:'Inter',sans-serif; }
    .hist-entry { background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:10px 12px; margin-bottom:6px; }
    .hist-entry-name { font-size:13px; font-weight:600; margin-bottom:2px; }
    .hist-entry-day { font-size:11px; color:var(--muted); margin-bottom:6px; }
    .hist-series { display:flex; gap:6px; flex-wrap:wrap; }
    .hist-chip { font-size:11px; color:var(--muted); background:var(--surface2); padding:2px 8px; border-radius:4px; }
    .hist-chip span { color:var(--text); font-weight:600; }
    .empty-state { padding:50px 16px; text-align:center; color:var(--muted); font-size:14px; line-height:1.6; }
 
    .rir-banner { background:var(--surface); border:1px solid var(--border); border-left:2px solid var(--accent); border-radius:0 var(--radius) var(--radius) 0; padding:10px 13px; margin-bottom:14px; font-size:12px; color:#888; line-height:1.6; }
    .rir-banner strong { color:var(--accent); }
 
    .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(12px); background:var(--accent); color:#000; padding:9px 18px; border-radius:20px; font-size:13px; font-weight:700; opacity:0; transition:all 0.25s; pointer-events:none; white-space:nowrap; z-index:300; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
 
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-title">RUTINA <span>BRUNO</span></div>
    <div class="home-sub">Elegí el día de hoy</div>
  </div>
  <div class="week-pill">📅 Semana <strong id="week-num">—</strong></div>
  <div class="day-grid" id="day-grid"></div>
  <button class="history-btn" onclick="goHistory()">🕐 Ver historial de entrenamientos</button>
</div>
 
<div id="screen-day" class="screen">
  <div class="day-top">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="day-top-info">
      <div class="dt-title" id="dt-title">—</div>
      <div class="dt-sub" id="dt-sub">—</div>
    </div>
  </div>
  <div class="exercises-wrap" id="exercises-wrap"></div>
</div>
 
<div id="screen-history" class="screen">
  <div class="hist-top">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="hist-top-title">HISTORIAL</div>
  </div>
  <div class="hist-wrap" id="hist-wrap"></div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>

      { id:'d1_2b', order:'2B', name:'Remo en Polea Agarre Cerrado', series:'3×10-12', rir:'RIR 2', pesoRef:'30 kg', nota:null, link:null },

      { id:'d1_3b', order:'3B', name:'Bíceps Curl c/ Mancuerna', series:'3×8-10', rir:'RIR 1-0', pesoRef:'14 kg', nota:'Ejercicio que te guste de bíceps. Recomendación: bíceps en polea.', link:null },
      { id:'d1_3c', order:'3C', name:'Extensión de Tríceps Katana', series:'3×10-12', rir:'RIR 1-0', pesoRef:'7.5 kg', nota:null, link:null },
    ]},
  ]},
  { id:'d2', label:'Día 2', focus:'Cuádriceps · Pecho · Espalda · Brazos · Hombros', groups:[
    { ss:'1', exercises:[
      { id:'d2_1a', order:'1A', name:'Cuádriceps en Máquina', series:'3×8-12', rir:null, pesoRef:'52.5 kg', nota:null, link:'https://www.youtube.com/watch?v=aE0EfiWQM8U' },
    ]},
    { ss:'2', exercises:[
      { id:'d2_2a', order:'2A', name:'Pecho Plano con Barra', series:'3×6/8', rir:'RIR 2', pesoRef:'20 kg', nota:null, link:null },
      { id:'d2_2b', order:'2B', name:'Jalón al Pecho', series:'3×8/10', rir:'RIR 1-0', pesoRef:'35 kg', nota:null, link:null },
    ]},
    { ss:'3', exercises:[
      { id:'d2_3a', order:'3A', name:'Bíceps Martillo c/ Polea', series:'3×8/12', rir:'RIR 1-0', pesoRef:'21 kg', nota:'Podés hacerlo con mancuerna o con la cuerda en la polea.', link:null },
      { id:'d2_3b', order:'3B', name:'Extensión de Tríceps en Polea c/ Barra', series:'3×8/12', rir:null, pesoRef:'25 kg', nota:null, link:null },

    ]},
  ]},
  { id:'d3', label:'Día 3', focus:'Isquios · Pecho · Espalda · Hombros · Brazos', groups:[
    { ss:'1', exercises:[
      { id:'d3_1a', order:'1A', name:'RDL con Mancuernas + Gemelos', series:'3×6/8', rir:null, pesoRef:'18 kg', nota:'Por ahora no importa el peso: TÉCNICA. No fuerces el estiramiento, va cediendo de a poco.', link:null },
      { id:'d3_1b', order:'1B', name:'Abdominales en Banco Declinado', series:'3×8/12', rir:null, pesoRef:null, nota:null, link:null },
    ]},
    { ss:'2', exercises:[
      { id:'d3_2a', order:'2A', name:'Peck Deck', series:'3×8/10', rir:null, pesoRef:'67 kg', nota:null, link:null },
      { id:'d3_2b', order:'2B', name:'Remo en Polea Agarre Abierto', series:'3×6/10', rir:null, pesoRef:'25 kg', nota:null, link:null },
    ]},
    { ss:'3', exercises:[
      { id:'d3_3a', order:'3A', name:'Press de Hombro c/ Mancuernas', series:'3×8/10', rir:'RIR 2', pesoRef:'18 kg', nota:null, link:null },
      { id:'d3_3b', order:'3B', name:'Curl de Bíceps Scott', series:'3×8/12', rir:'RIR 1-0', pesoRef:null, nota:'HOMBROS SIEMPRE POR DETRÁS DEL CUERPO.', link:null },
      { id:'d3_3c', order:'3C', name:'Patada de Tríceps con Polea', series:'3×8/12', rir:'RIR 1-0', pesoRef:null, nota:'CODOS FIJOS.', link:null },
    ]},
  ]},
  { id:'d4', label:'Día 4', focus:'Isquios · Pecho · Espalda · Brazos', groups:[
    { ss:'1', exercises:[
      { id:'d4_1a', order:'1A', name:'Camilla de Isquios', series:'3×8/10', rir:null, pesoRef:'45 kg', nota:null, link:null },
    ]},
    { ss:'2', exercises:[
      { id:'d4_2a', order:'2A', name:'Fondos en Paralelas', series:'3×6-8', rir:null, pesoRef:null, nota:'Clave para el pecho y la salud de los hombros. Si necesitás, hacelo asistido con banda.', link:null },
      { id:'d4_2b', order:'2B', name:'Dominadas Supinas', series:'3×6-8', rir:null, pesoRef:null, nota:'Si necesitás ayuda, agarrá una goma.', link:null },
    ]},
    { ss:'3', exercises:[
      { id:'d4_3a', order:'3A', name:'Curl de Bíceps Invertido', series:'3×8-10', rir:'RIR 2', pesoRef:null, nota:null, link:null },
      { id:'d4_3b', order:'3B', name:'Extensión de Tríceps en Polea', series:'3×10-12', rir:'RIR 2-1', pesoRef:null, nota:null, link:null },
    ]},
  ]},
];
 
const S = 'gym_bruno_';
 
function getWeekKey(d=new Date()){
  const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  u.setUTCDate(u.getUTCDate()+4-(u.getUTCDay()||7));
  const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));
  return `${u.getUTCFullYear()}-W${String(Math.ceil(((u-y)/864e5+1)/7)).padStart(2,'0')}`;
}
 
function loadLog(exId,wk){ try{return JSON.parse(localStorage.getItem(S+wk+'_'+exId)||'null');}catch{return null;} }
function saveLog(exId,wk,data){ localStorage.setItem(S+wk+'_'+exId,JSON.stringify(data)); }
 
// Devuelve el peso máximo histórico para un ejercicio (en todos los logs de todas las semanas)
function getMaxPeso(exId){
  let max = null;
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k || !k.startsWith(S)) continue;
    if(!k.includes(exId)) continue;
    try{
      const data=JSON.parse(localStorage.getItem(k));
      if(!data) continue;
      for(const s of data){
        const p=parseFloat(s.peso);
        if(!isNaN(p) && (max===null || p>max)) max=p;
      }
    }catch{}
  }
  return max;
}
 
function isDayDone(dayId){
  const wk=getWeekKey();
  const day=ROUTINE.find(d=>d.id===dayId);
  if(!day) return false;
  return day.groups.some(g=>g.exercises.some(e=>loadLog(e.id,wk)));
}
 
function getAllLogs(){
  const logs=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||!k.startsWith(S)) continue;
    const rest=k.slice(S.length);
    const m=rest.match(/^(\d{4}-W\d{2})_(.+)$/);
    if(!m) continue;
    try{const data=JSON.parse(localStorage.getItem(k));if(data)logs.push({wk:m[1],exId:m[2],data});}catch{}
  }
  return logs.sort((a,b)=>b.wk.localeCompare(a.wk));
}
 
function findEx(exId){
  for(const day of ROUTINE)for(const g of day.groups)for(const e of g.exercises)if(e.id===exId)return{ex:e,day};
  return null;
}
 
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
 
function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
  renderHome();
}
 
function goHistory(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-history').classList.add('active');
  renderHistory();
}
 
function renderHome(){
  const wk=getWeekKey();
  document.getElementById('week-num').textContent=wk.split('-W')[1]+' · '+wk.split('-W')[0];
  document.getElementById('day-grid').innerHTML=ROUTINE.map(day=>{
    const done=isDayDone(day.id);
    return `<div class="day-card" onclick="goDay('${day.id}')">
      ${done?`<div class="dc-done">✓</div>`:''}
      <div class="dc-num">${day.id.replace('d','')}</div>
      <div class="dc-label">${day.label}</div>
      <div class="dc-focus">${day.focus}</div>
    </div>`;
  }).join('');
}
 
function goDay(dayId){
  const day=ROUTINE.find(d=>d.id===dayId);
  document.getElementById('dt-title').textContent=day.label;
  document.getElementById('dt-sub').textContent=day.focus;
 
  const wk=getWeekKey();
  let html=`<div class="rir-banner"><strong>RIR</strong> = reps que te quedaron en el tanque. RIR 2 = te entraban 2 más. RIR 0 = al límite. <strong>Superseries</strong>: A y B van uno tras otro sin descanso.</div>`;
 
  for(const grp of day.groups){
    const isSingle=grp.exercises.length===1;
    if(!isSingle){
      html+=`<div class="superset-tag"><span class="ss-badge">SUPERSERIE ${grp.ss}</span></div>`;
    }
    for(const ex of grp.exercises){
      const log=loadLog(ex.id,wk);
      const maxP=getMaxPeso(ex.id);
      const numS=log?log.length:3;
      let rows='';
      for(let s=0;s<numS;s++){
        const e=log?log[s]:null;
        rows+=`<div class="series-row" id="row_${ex.id}_${s}">
          <span class="series-num">${s+1}</span>
          <input type="number" inputmode="numeric" placeholder="—" value="${e?.reps||''}" id="reps_${ex.id}_${s}" onchange="autoSave('${ex.id}','${wk}')" />
          <input type="number" inputmode="numeric" placeholder="—" value="${e?.peso||''}" id="peso_${ex.id}_${s}" onchange="autoSave('${ex.id}','${wk}')" />
          <input type="number" inputmode="numeric" placeholder="—" value="${e?.rir||''}" id="rir_${ex.id}_${s}" onchange="autoSave('${ex.id}','${wk}')" />
        </div>`;
      }
 
      // Chip de peso: si hay historial muestra máximo, si no muestra ref del profe
      let pesoChip = '';
      if(maxP !== null){
        pesoChip = `<span class="chip max">Máx: ${maxP} kg</span>`;
      } else if(ex.pesoRef){
        pesoChip = `<span class="chip ref">Ref: ${ex.pesoRef}</span>`;
      }
 
      html+=`<div class="ex-card" id="card_${ex.id}">
        <div class="ex-header" onclick="toggleEx('${ex.id}')">
          <span class="ex-order">${ex.order}</span>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-chips">
              <span class="chip series">${ex.series}</span>
              ${ex.rir?`<span class="chip">${ex.rir}</span>`:''}
              ${pesoChip}
            </div>
          </div>
          <span class="ex-arrow">▾</span>
        </div>
        <div class="ex-body">
          ${ex.nota?`<div class="ex-note">📝 ${ex.nota}</div>`:''}
          ${ex.link?`<a href="${ex.link}" class="yt-link" target="_blank">▶ Ver video en YouTube</a>`:''}
          <div class="log-title">Registro de hoy</div>
          <div class="series-hdr"><span></span><span>Reps</span><span>Peso kg</span><span>RIR</span></div>
          <div id="series_${ex.id}">${rows}</div>
          <button class="add-serie-btn" onclick="addSerie('${ex.id}','${wk}')">+ Agregar serie</button>
          <button class="save-btn ${log?'saved':''}" id="savebtn_${ex.id}" onclick="saveEx('${ex.id}','${wk}')">${log?'✓ Guardado':'Guardar'}</button>
        </div>
      </div>`;
    }
  }
 
  document.getElementById('exercises-wrap').innerHTML=html;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-day').classList.add('active');
}
 
function toggleEx(exId){
  document.getElementById('card_'+exId).classList.toggle('open');
}
 
function addSerie(exId,wk){
  const c=document.getElementById('series_'+exId);
  const s=c.querySelectorAll('.series-row').length;
  const d=document.createElement('div');
  d.className='series-row'; d.id=`row_${exId}_${s}`;
  d.innerHTML=`<span class="series-num">${s+1}</span>
    <input type="number" inputmode="numeric" placeholder="—" id="reps_${exId}_${s}" onchange="autoSave('${exId}','${wk}')" />
    <input type="number" inputmode="numeric" placeholder="—" id="peso_${exId}_${s}" onchange="autoSave('${exId}','${wk}')" />
    <input type="number" inputmode="numeric" placeholder="—" id="rir_${exId}_${s}" onchange="autoSave('${exId}','${wk}')" />`;
  c.appendChild(d);
}
 
function autoSave(exId,wk){
  const c=document.getElementById('series_'+exId);
  if(!c) return;
  const rows=c.querySelectorAll('.series-row');
  const data=[];
  rows.forEach((_,i)=>{
    const reps=document.getElementById(`reps_${exId}_${i}`)?.value;
    const peso=document.getElementById(`peso_${exId}_${i}`)?.value;
    const rir=document.getElementById(`rir_${exId}_${i}`)?.value;
    if(reps||peso||rir) data.push({reps,peso,rir});
  });
  if(data.length){
    saveLog(exId,wk,data);
    const btn=document.getElementById('savebtn_'+exId);
    if(btn){btn.textContent='✓ Guardado';btn.classList.add('saved');}
  }
}
 
function saveEx(exId,wk){
  autoSave(exId,wk);
  showToast('¡Guardado! 💪');
}
 
function renderHistory(){
  const logs=getAllLogs();
  const c=document.getElementById('hist-wrap');
  if(!logs.length){c.innerHTML='<div class="empty-state">Aún no hay registros.<br>¡Empezá a entrenar!</div>';return;}
  const byWeek={};
  for(const l of logs){if(!byWeek[l.wk])byWeek[l.wk]=[];byWeek[l.wk].push(l);}
  let html='';
  for(const [wk,entries] of Object.entries(byWeek)){
    html+=`<div class="week-block">
      <div class="week-block-hdr">
        <div class="week-block-title">Semana ${wk.split('-W')[1]} · ${wk.split('-W')[0]}</div>
        <button class="del-week-btn" onclick="delWeek('${wk}')">🗑 Borrar</button>
      </div>`;
    for(const {exId,data} of entries){
      const f=findEx(exId); if(!f) continue;
      const {ex,day}=f;
      const chips=data.map((s,i)=>`<span class="hist-chip">S${i+1}: <span>${s.reps||'?'} reps${s.peso?' · '+s.peso+'kg':''}</span></span>`).join('');
      html+=`<div class="hist-entry">
        <div class="hist-entry-name">${ex.name}</div>
        <div class="hist-entry-day">${day.label} · ${ex.order}</div>
        <div class="hist-series">${chips}</div>
      </div>`;
    }
    html+='</div>';
  }
  c.innerHTML=html;
}
 
function delWeek(wk){
  if(!confirm(`¿Borrar semana ${wk.split('-W')[1]}?`)) return;
  const keys=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(S+wk))keys.push(k);}
  keys.forEach(k=>localStorage.removeItem(k));
  renderHistory();
  showToast('Semana borrada');
}
 
renderHome();
</script>
</body>
